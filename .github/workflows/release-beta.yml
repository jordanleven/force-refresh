name: Release Beta Build
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+-*.[0-9]+"

jobs:
  set-variables:
    name: Set Variables
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      node-version: ${{ steps.nvm.outputs.NVMRC }}
      php-version: ${{ steps.php.outputs.PHP_VERSION }}
      build-number: ${{ steps.build-number.outputs.BUILD_NUMBER }}

    steps:
      - uses: actions/checkout@v6

      - name: Get node version
        run: echo "NVMRC=$(cat .nvmrc)" >> $GITHUB_OUTPUT
        id: nvm

      - name: Get PHP version
        run: echo "PHP_VERSION=8.2" >> $GITHUB_OUTPUT
        id: php

      - name: Set Build Number
        run: echo "BUILD_NUMBER=$(cat package.json | jq -r '.version')" >> $GITHUB_OUTPUT
        id: build-number

  install-dependencies:
    name: Cache Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: set-variables

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set node version
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.set-variables.outputs.node-version }}

      - name: Set PHP version
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ needs.set-variables.outputs.php-version }}

      - name: Install Node dependencies
        run: npm ci

      - name: Install Composer dependencies
        run: composer install

      - name: Save to Cache
        uses: actions/cache/save@v5
        with:
          path: |
            vendor
            node_modules
          key: dependencies-${{ runner.os }}-${{ github.sha }}

  linting:
    name: Linting
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - install-dependencies
      - set-variables

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set node version
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.set-variables.outputs.node-version }}

      - name: Pull dependencies from cache
        uses: actions/cache@v5
        with:
          fail-on-cache-miss: true
          path: |
            vendor
            node_modules
          key: dependencies-${{ runner.os }}-${{ github.sha }}

      - name: Lint JavaScript source code
        run: npm run lint

      - name: Lint PHP source code
        run: composer lint

  testing-javascript:
    name: Testing – JavaScript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - install-dependencies
      - set-variables

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set node version
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.set-variables.outputs.node-version }}

      - name: Pull dependencies from cache
        uses: actions/cache@v5
        with:
          fail-on-cache-miss: true
          path: |
            vendor
            node_modules
          key: dependencies-${{ runner.os }}-${{ github.sha }}

      - name: Test JavaScript source code
        run: npm test
        env:
          TZ: America/New_York

  testing-php:
    name: Testing – PHP
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - install-dependencies
      - set-variables

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set PHP version
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ needs.set-variables.outputs.php-version }}

      - name: Pull dependencies from cache
        uses: actions/cache@v5
        with:
          path: |
            vendor
            node_modules
          key: dependencies-${{ runner.os }}-${{ github.sha }}

      - name: Test PHP source code
        run: composer test

  build:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs:
      - install-dependencies
      - set-variables

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Pull dependencies from cache
      uses: actions/cache@v5
      with:
        fail-on-cache-miss: true
        path: |
          vendor
          node_modules
        key: dependencies-${{ runner.os }}-${{ github.sha }}

    - name: Set node version
      uses: actions/setup-node@v6
      with:
        node-version: ${{ needs.set-variables.outputs.node-version }}

    - name: Build JavaScript artifact
      run: npm run build

    - name: Create release notes
      run: |
        NEXT_VERSION=$(npx changie next auto 2>/dev/null || echo "unreleased")
        cp CHANGELOG.md CHANGELOG.md.bak
        npx changie batch "$NEXT_VERSION" 2>/dev/null || true
        if [ -f ".changes/${NEXT_VERSION}.md" ]; then
          {
            head -n 4 CHANGELOG.md
            cat ".changes/${NEXT_VERSION}.md"
            printf "\n"
            tail -n +5 CHANGELOG.md
          } > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md
          cp ".changes/${NEXT_VERSION}.md" release-notes.md
        fi
        npm run changelog:build
        mv CHANGELOG.md.bak CHANGELOG.md
        rm -f ".changes/${NEXT_VERSION}.md"

    - name: Prune Composer dependencies
      run: composer install --no-dev --no-scripts

    - name: Prune JavaScript dependencies
      run: npm prune --production

    - name: Copy beta release notice
      run: cp docs/Beta-Releases.md ./

    - name: Find files not included in distignore
      id: dist-files
      run: echo "DIST_FILES=$(find . -type f | grep -v -E -f .distignore | tr '\n' ' ')" >> $GITHUB_OUTPUT

    - name: Build plugin artifact
      uses: vimtor/action-zip@v1.3
      with:
        files: ${{ steps.dist-files.outputs.DIST_FILES }}
        recursive: false
        dest: ./Force-Refresh-${{ needs.set-variables.outputs.build-number }}.zip

    - name: Save build to cache
      uses: actions/cache/save@v5
      with:
        path: '**/'
        key: build-${{ runner.os }}-${{ github.sha }}

  testing-e2e:
    name: Testing – E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - install-dependencies
      - set-variables
      - linting
      - testing-javascript
      - testing-php
      - build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set node version
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.set-variables.outputs.node-version }}

      - name: Pull build artifact from cache
        uses: actions/cache@v5
        with:
          path: '**/'
          key: build-${{ runner.os }}-${{ github.sha }}

      - name: Pull dependencies from cache
        uses: actions/cache@v5
        with:
          path: |
            vendor
            node_modules
          key: dependencies-${{ runner.os }}-${{ github.sha }}

      - name: Add WordPress hostnames
        run: echo "127.0.0.1 wp6-3.force-refresh.localhost wp6.force-refresh.localhost" | sudo tee -a /etc/hosts

      - name: Start WordPress instances
        run: docker compose up -d --wait

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run e2e tests
        run: npm run test:e2e

  release:
    name: Release Beta
    runs-on: ubuntu-latest
    needs:
      - set-variables
      - install-dependencies
      - linting
      - testing-javascript
      - testing-php
      - build

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Get release notes
      id: release_notes
      run: |
        if [ -f release-notes.md ]; then
          NOTES=$(cat release-notes.md)
        else
          NOTES="No release notes found."
        fi
        echo "NOTES<<EOF" >> $GITHUB_OUTPUT
        echo "$NOTES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Get commits since last stable release
      id: changes
      run: |
        PREV_STABLE_TAG=$(git tag --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
        FORMAT_COMMITS() {
          grep -vE 'chore.*\(release\)' || true | \
          sed 's|^\([a-f0-9]*\) \(.*\)|[\1](https://github.com/jordanleven/force-refresh/commit/\1) \2|'
        }
        if [ -z "$PREV_STABLE_TAG" ]; then
          COMMITS=$(git log --no-merges --format='%h %s' HEAD | FORMAT_COMMITS)
        else
          COMMITS=$(git log ${PREV_STABLE_TAG}..HEAD --no-merges --format='%h %s' | FORMAT_COMMITS)
        fi
        echo "COMMITS<<EOF" >> $GITHUB_OUTPUT
        echo "$COMMITS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Pull build from cache
      uses: actions/cache@v5
      with:
        path: '**/'
        key: build-${{ runner.os }}-${{ github.sha }}

    - name: Format asset name
      id: asset-name
      run: |
        FORMATTED=$(echo "${{ needs.set-variables.outputs.build-number }}" | tr '.' '-')
        echo "NAME=force-refresh-${FORMATTED}" >> $GITHUB_OUTPUT

    - name: Create GitHub release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ./Force-Refresh-${{ needs.set-variables.outputs.build-number }}.zip
        asset_name: ${{ steps.asset-name.outputs.NAME }}.zip
        tag: ${{ github.ref }}
        release_name: Force Refresh ${{ needs.set-variables.outputs.build-number  }}
        overwrite: true
        prerelease: true
        body: "This is a beta release of Force Refresh (v${{ needs.set-variables.outputs.build-number }}).
          This release is intended to be used for debugging and **should not** be used on production sites unless directed.
          Production-stable versions are available at https://wordpress.org/plugins/force-refresh.
          \n\n## Upcoming Release Notes\n\n${{ steps.release_notes.outputs.NOTES }}
          \n\n## Commits Since Last Release\n\n${{ steps.changes.outputs.COMMITS }}"

    - name: Comment on PR
      uses: mshick/add-pr-comment@v3.9.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        message: Build ${{ needs.set-variables.outputs.build-number }} is [available for download](https://github.com/jordanleven/force-refresh/releases/download/v${{ needs.set-variables.outputs.build-number }}/${{ steps.asset-name.outputs.NAME }}.zip) under [Releases](https://github.com/jordanleven/force-refresh/releases/tag/v${{ needs.set-variables.outputs.build-number }}).
        allow-repeats: true

    - name: Simulate deploy to WordPress.org
      uses: 10up/action-wordpress-plugin-deploy@stable
      with:
        dry-run: true
      env:
        ASSETS_DIR: .wordpress-org
        SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
        SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
        SLUG: force-refresh
