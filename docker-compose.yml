version: '3.4'
services:
  traefik:
    image: traefik:v2.1.3
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=true
      - --entrypoints.web.address=:80
      - --ping
    ports:
      - 80:80
      - 8080:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: force-refresh-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    labels:
      - "traefik.enable=false"

  db-qa:
    container_name: 'force-refresh-db-dev-container-wp-qa'
    image: mariadb:10.3
    volumes:
      - './.docker-build/data/mysql_qa:/var/lib/mysql'
      - ./db/wp-qa:/docker-entrypoint-initdb.d
    ports:
      - 18766:3306
    environment:
      MYSQL_ROOT_PASSWORD: force-refresh_root_password
      MYSQL_DATABASE: force-refresh-dev-db
      MYSQL_USER: force-refresh-dev-user
      MYSQL_PASSWORD: force-refresh-dev-password

  wordpress-qa:
    hostname: qa.force-refresh.localhost
    container_name: 'force-refresh-dev-container-wp-qa'
    depends_on:
      - db-qa
      - mailpit
      - traefik
    build:
      context: .
      dockerfile: docker/Dockerfile.qa
    ports:
      - '8086:80'
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/wp-json/"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    environment:
      WORDPRESS_DB_HOST: 'db-qa:3306'
      WORDPRESS_DB_NAME: force-refresh-dev-db
      WORDPRESS_DB_USER: force-refresh-dev-user
      WORDPRESS_DB_PASSWORD: force-refresh-dev-password
      WORDPRESS_DEBUG: 1
      WP_DEBUG_DISPLAY: 1
      WP_DEBUG_LOG: 1
      WORDPRESS_CONFIG_EXTRA: "define('WP_ENVIRONMENT_TYPE', 'local');"
    volumes:
      - "./.docker-build/wordpress_qa:/var/www/html"
      - "./qa:/var/www/html/wp-content/plugins/force-refresh"
      - "./docker/mu-plugins/smtp.php:/var/www/html/wp-content/mu-plugins/smtp.php"
    labels:
      - "traefik.http.routers.qa.rule=host(`qa.force-refresh.localhost`)"
      - "traefik.http.services.qa.loadbalancer.server.port=80"

  db-wp5:
    container_name: 'force-refresh-db-dev-container-wp-5'
    image: mariadb:10.3
    volumes:
      - './.docker-build/data/mysql_wp5:/var/lib/mysql'
      - ./db/wp-5:/docker-entrypoint-initdb.d
    ports:
      - 18767:3306
    environment:
      MYSQL_ROOT_PASSWORD: force-refresh_root_password
      MYSQL_DATABASE: force-refresh-dev-db
      MYSQL_USER: force-refresh-dev-user
      MYSQL_PASSWORD: force-refresh-dev-password

  wordpress-wp5:
    hostname: wp5.force-refresh.localhost
    container_name: 'force-refresh-dev-container-wp-5'
    depends_on:
      - db-wp5
      - mailpit
      - traefik
    image: 'wordpress:5.9-php7.4-apache'
    ports:
      - '8083:80'
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/wp-json/"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    environment:
      WORDPRESS_DB_HOST: 'db-wp5:3306'
      WORDPRESS_DB_NAME: force-refresh-dev-db
      WORDPRESS_DB_USER: force-refresh-dev-user
      WORDPRESS_DB_PASSWORD: force-refresh-dev-password
      WORDPRESS_DEBUG: 1
      WP_DEBUG_DISPLAY: 1
      WP_DEBUG_LOG: 1
      WORDPRESS_CONFIG_EXTRA: "define('WP_ENVIRONMENT_TYPE', 'local'); define('AUTOMATIC_UPDATER_DISABLED', true);"
    volumes:
      - "./.docker-build/wordpress_wp5:/var/www/html"
      - "./:/var/www/html/wp-content/plugins/force-refresh"
      - "./docker/mu-plugins/smtp.php:/var/www/html/wp-content/mu-plugins/smtp.php"
    labels:
      - "traefik.http.routers.wp5.rule=host(`wp5.force-refresh.localhost`)"
      - "traefik.http.services.wp5.loadbalancer.server.port=80"

  db-wp6:
