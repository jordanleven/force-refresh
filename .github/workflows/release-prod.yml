name: Release Production Build
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "!v[0-9]+.[0-9]+.[0-9]+-"

jobs:
  check-commit-message:
    name: Check Commit Message
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Proofread commit types since last release
        run: |
          PREV_TAG=$(git describe --abbrev=0 --tags HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            SUBJECTS=$(git log --no-merges --format='%s')
          else
            SUBJECTS=$(git log ${PREV_TAG}..HEAD --no-merges --format='%s')
          fi
          echo "$SUBJECTS" | while IFS= read -r subject; do
            if ! echo "$subject" | grep -qE '^(feat|fix|docs|style|refactor|test|chore).+'; then
              echo "Invalid commit message: $subject"
              echo "Commit messages must begin with a valid commit type."
              exit 1
            fi
          done

  set-variables:
    name: Set Variables
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      node-version: ${{ steps.nvm.outputs.NVMRC }}
      php-version: ${{ steps.php.outputs.PHP_VERSION }}
      release-version: ${{ steps.release-version.outputs.RELEASE_VERSION }}

    steps:
      - uses: actions/checkout@v6

      - name: Get node version .nvmrc
        run: echo "NVMRC=$(cat .nvmrc)" >> $GITHUB_OUTPUT
        id: nvm

      - name: Get PHP version
        run: echo "PHP_VERSION=8.2" >> $GITHUB_OUTPUT
        id: php

      - name: Get release version
        run: echo "RELEASE_VERSION=$(cat package.json | jq -r '.version')" >> $GITHUB_OUTPUT
        id: release-version

  install-dependencies:
    name: Cache Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: set-variables

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set node version
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.set-variables.outputs.node-version }}

      - name: Set PHP version
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ needs.set-variables.outputs.php-version }}

      - name: Install Node dependencies
        run: npm ci

      - name: Install Composer dependencies
        run: composer install

      - name: Save to Cache
        uses: actions/cache/save@v5
        with:
          path: |
            vendor
            node_modules
          key: dependencies-${{ runner.os }}-${{ github.sha }}

  linting:
    name: Linting
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - install-dependencies
      - set-variables

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set node version
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.set-variables.outputs.node-version }}

      - name: Pull dependencies from cache
        uses: actions/cache@v5
        with:
          path: |
            vendor
            node_modules
          key: dependencies-${{ runner.os }}-${{ github.sha }}

      - name: Lint JavaScript source code
        run: npm run lint

      - name: Lint PHP source code
        run: composer lint

  testing-javascript:
    name: Testing – JavaScript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - install-dependencies
      - set-variables

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set node version
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.set-variables.outputs.node-version }}

      - name: Pull dependencies from cache
        uses: actions/cache@v5
        with:
          path: |
            vendor
            node_modules
          key: dependencies-${{ runner.os }}-${{ github.sha }}

      - name: Test JavaScript source code
        run: npm test
        env:
          TZ: America/New_York

  testing-php:
    name: Testing – PHP
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - install-dependencies
      - set-variables

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set PHP version
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ needs.set-variables.outputs.php-version }}

      - name: Pull dependencies from cache
        uses: actions/cache@v5
        with:
          path: |
            vendor
            node_modules
          key: dependencies-${{ runner.os }}-${{ github.sha }}

      - name: Test PHP source code
        run: composer test

  build:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs:
      - install-dependencies
      - set-variables

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Pull dependencies from cache
      uses: actions/cache@v5
      with:
        fail-on-cache-miss: true
        path: |
          vendor
          node_modules
        key: dependencies-${{ runner.os }}-${{ github.sha }}

    - name: Set node version
      uses: actions/setup-node@v6
      with:
        node-version: ${{ needs.set-variables.outputs.node-version }}

    - name: Set PHP version
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ needs.set-variables.outputs.php-version }}

    - name: Build JavaScript artifact
      run: npm run build

    - name: Create release notes
      run: npm run changelog:build

    - name: Prune Composer dependencies
      run: composer install --no-dev --no-scripts

    - name: Prune JavaScript dependencies
      run: npm prune --production

    - name: Find files not included in distignore
      id: dist-files
      run: echo "DIST_FILES=$(find . -type f | grep -v -E -f .distignore | tr '\n' ' ')" >> $GITHUB_OUTPUT

    - name: Build plugin artifact
      uses: vimtor/action-zip@v1.3
      with:
        files: ${{ steps.dist-files.outputs.DIST_FILES }}
        recursive: false
        dest: ./Force-Refresh-${{ needs.set-variables.outputs.release-version }}.zip

    - name: Save build to cache
      uses: actions/cache/save@v5
      with:
        path: '**/'
        key: build-${{ runner.os }}-${{ github.sha }}

  testing-e2e:
    name: Testing – E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - install-dependencies
      - set-variables
      - linting
      - testing-javascript
      - testing-php
      - build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set node version
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.set-variables.outputs.node-version }}

      - name: Pull build artifact from cache
        uses: actions/cache@v5
        with:
          path: '**/'
          key: build-${{ runner.os }}-${{ github.sha }}

      - name: Pull dependencies from cache
        uses: actions/cache@v5
        with:
          path: |
            vendor
            node_modules
          key: dependencies-${{ runner.os }}-${{ github.sha }}

      - name: Add WordPress hostnames
        run: echo "127.0.0.1 wp5.force-refresh.localhost wp6.force-refresh.localhost wp7.force-refresh.localhost" | sudo tee -a /etc/hosts

      - name: Start WordPress instances
        run: docker compose up -d --wait

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run e2e tests
        run: npm run test:e2e

  release:
    name: Release Production Build
    runs-on: ubuntu-latest
    needs:
      - set-variables
      - install-dependencies
      - linting
      - testing-javascript
      - testing-php
      - build
      - check-commit-message
      - testing-e2e

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Pull build from cache
      uses: actions/cache@v5
      with:
        fail-on-cache-miss: true
        path: '**/'
        key: build-${{ runner.os }}-${{ github.sha }}

    - name: Get commits since last release
      id: get_commits
      run: |
        PREV_TAG=$(git describe --abbrev=0 --tags HEAD^ 2>/dev/null || echo "")
        bash .github/scripts/getCommitsSinceRelease.sh "$PREV_TAG"

    - name: Deploy plugin to WordPress.org
      uses: 10up/action-wordpress-plugin-deploy@stable
      with:
        dry-run: false
      env:
        ASSETS_DIR: .wordpress-org
        SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
        SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
        SLUG: force-refresh

    - name: Create Release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ./Force-Refresh-${{ needs.set-variables.outputs.release-version}}.zip
        asset_name: Force_Refresh_v${{ needs.set-variables.outputs.release-version}}.zip
        tag: ${{ github.ref }}
        release_name: Force Refresh ${{ needs.set-variables.outputs.release-version }}
        prerelease: false
        body: "This is a production release of Force Refresh (v${{ needs.set-variables.outputs.release-version }}).
          This version, and all production-stable versions, are available at https://wordpress.org/plugins/force-refresh.
          \n\n## Release Notes\n${{ steps.get_commits.outputs.COMMITS }}"
